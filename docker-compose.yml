services:
  app:
    build:
      context: .
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - ./data:/app/data
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"

volumes:
  node_modules:
  next_cache:
